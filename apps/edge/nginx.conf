# Openship edge — baked, complete config. The api writes managed vhosts into
# sites-enabled/*.conf (shared volume) and reloads via `docker exec`; nothing
# here is edited at runtime. Mirrors the directives the bare installer's
# deployLuaScripts() patches in (shared dicts + lua path) plus the default +
# management server blocks.
worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log warn;
pid /usr/local/openresty/nginx/logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Shared-memory zones the openship Lua depends on (analytics counters, raw-log
    # ring buffers + live-log pipe, per-route rules cache, rate-limit counters).
    lua_shared_dict analytics 256m;
    lua_shared_dict request_data 128m;
    lua_shared_dict rules 32m;
    lua_shared_dict rl_counters 16m;
    # OpenResty default lualib + the baked openship modules.
    lua_package_path "/usr/local/openresty/site/lualib/?.lua;;";

    # Managed vhosts — the api drops <slug>.conf here (shared sites-enabled
    # volume). An empty glob is not an error, so a fresh edge boots fine.
    include /usr/local/openresty/nginx/conf/sites-enabled/*.conf;

    # Default catch-all: serve ACME http-01 challenges (managed TLS) and 404 any
    # host without a managed vhost. Keeps the stock OpenResty welcome page away.
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/acme;
        }

        location / {
            return 404;
        }
    }

    # Internal analytics + live-log streaming API (loopback only). Queried by the
    # api over the Docker network / exec; never publicly exposed.
    server {
        listen 127.0.0.1:9145;

        send_timeout          3600s;
        keepalive_timeout     3600s;
        lua_check_client_abort on;

        location = /logs/stream {
            content_by_lua_file /usr/local/openresty/site/lualib/openship/pipe_stream.lua;
        }

        location / {
            content_by_lua_file /usr/local/openresty/site/lualib/openship/mgmt_api.lua;
        }
    }
}
