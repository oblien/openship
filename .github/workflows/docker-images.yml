name: Docker images

# Publishes the official pull-based images (openship-api + openship-dashboard +
# openship-edge) to GHCR. Deliberately SEPARATE from release.yml (the bun
# binary / npm CLI / desktop installers / GitHub release) so image publishing
# can be iterated + tested on its own.
#
# Triggers:
#   • tag push v*.*.*      → real release: semver tags + :latest (RCs skip :latest)
#   • workflow_dispatch     → manual test: publish images ONLY under the given tag
#                             (or the short SHA), and NEVER move :latest. Lets you
#                             prerelease-test Docker without cutting a release or
#                             touching the current :latest.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for a manual test (e.g. 0.0.0-rc.1). Blank → short SHA. Never moves :latest."
        required: false
        type: string

concurrency:
  group: docker-images-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Native per-arch builds (no QEMU — reuses the ubuntu-24.04-arm runner). Each
  # arch is pushed to GHCR BY DIGEST; merge-images assembles the manifest lists.
  build-images:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: [api, dashboard, edge]
        platform: [amd64, arm64]
        include:
          - platform: amd64
            runner: ubuntu-24.04
          - platform: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openship-${{ matrix.image }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.image }}/Dockerfile
          platforms: linux/${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=ghcr.io/${{ github.repository_owner }}/openship-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform }}

      - name: Export digest
        run: |
          set -euo pipefail
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image }}-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-images:
    name: Publish ${{ matrix.image }} (manifest)
    needs: build-images
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        image: [api, dashboard, edge]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          pattern: digests-${{ matrix.image }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag push → semver + :latest (auto: RCs like v1.2.3-rc.1 skip :latest).
      # Manual dispatch → the input tag (or short SHA), and NEVER :latest.
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openship-${{ matrix.image }}
          tags: |
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'push' }}
            type=raw,value=${{ github.event.inputs.tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '' }}
            type=sha,format=short,enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag == '' }}
          flavor: |
            latest=${{ github.event_name == 'push' && 'auto' || 'false' }}

      - name: Create manifest list + push
        working-directory: /tmp/digests
        env:
          METADATA_JSON: ${{ steps.meta.outputs.json }}
          SRC: ghcr.io/${{ github.repository_owner }}/openship-${{ matrix.image }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$METADATA_JSON") \
            $(printf "${SRC}@sha256:%s " *)

      - name: Inspect
        run: |
          docker buildx imagetools inspect \
            "ghcr.io/${{ github.repository_owner }}/openship-${{ matrix.image }}:${{ steps.meta.outputs.version }}" || true
